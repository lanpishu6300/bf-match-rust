name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test / fmt / clippy / fair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97.1"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test workspace
        run: cargo test --workspace

      - name: Test ART feature
        run: cargo test -p match-core-hp --features art

      - name: Fair compare (fill_rate > 0)
        run: cargo run -p match-bench --release --bin fair_compare -- --n 20000

      - name: WAL unit tests
        run: cargo test -p match-wal

  coverage:
    name: branch coverage 100%
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly + llvm-tools
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Branch coverage gate (100%)
        run: bash scripts/check-branch-coverage.sh
